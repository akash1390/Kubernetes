apiVersion: apps/v1
kind: Deployment
metadata:
  name: mylogin-deploy
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      name: nginx-dep-pod
      labels:
        app: nginx

    spec:
      containers:
        -  name: login
           image: nginx:latest
           ports:
           - containerPort: 80 
