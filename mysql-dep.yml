apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: myapp

spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      name: mysqldb
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql-pods
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: mydb
          volumeMounts: 
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim: 
            claimName: mysql-pv-claim
